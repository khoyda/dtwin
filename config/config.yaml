# Configuration for the Canola Digital Twin
# Paths are relative to the project root unless absolute.

paths:
  data_raw: data/raw
  data_processed: data/processed
  data_external: data/external
  artifacts: artifacts

region:
  name: Canadian Prairies
  # Default agro-climatic zone used when a field has no explicit zone.
  default_zone: SK-dark-brown

season:
  # Typical Prairie canola calendar (day-of-year bounds for the simulation window).
  seeding_doy_default: 130     # ~ May 10
  harvest_doy_default: 260     # ~ mid-September

agronomy:
  gdd_base_temp_c: 5.0         # canola base temperature for GDD accumulation
  gdd_cap_temp_c: 30.0         # upper cap applied to daily mean before GDD calc
  heat_stress_threshold_c: 29.5  # daily max above this during flowering -> flower abortion
  # Cumulative GDD thresholds (base 5C) marking phenological stage transitions.
  stage_gdd_thresholds:
    emergence: 120
    rosette: 350
    bolting: 600
    flowering: 900
    ripening: 1500
    maturity: 1900

water_balance:
  soil_water_capacity_mm: 150.0   # plant-available water in rooting zone
  initial_soil_water_frac: 0.7    # fraction of capacity at seeding
  crop_coefficient_kc: 1.0        # mid-season Kc (simplified, single value)

data_sources:
  # Training window (years). Canola yields available well before this; kept
  # recent so a single ECCC station ID covers the period without stitching.
  start_year: 1995
  end_year: 2023
  # Growing-season window used to aggregate daily weather into season features.
  season_start: {month: 5, day: 1}    # ~ seeding
  season_end: {month: 9, day: 30}     # ~ harvest

  eccc:
    # One representative long-record agricultural (CDA) station per province.
    # station_id -> {province, name}. Override/extend freely.
    stations:
      2925: {province: Saskatchewan, name: INDIAN HEAD CDA, lat: 50.55, lon: -103.65}
      2265: {province: Alberta, name: LETHBRIDGE CDA, lat: 49.70, lon: -112.77}
      26857: {province: Manitoba, name: CARMAN U OF M CS, lat: 49.50, lon: -98.03}

  statcan:
    table_pid: "32100359"            # Estimated areas, yield, production of crops
    crop: Canola (rapeseed)
    yield_disposition: Average yield (kilograms per hectare)
    provinces: [Saskatchewan, Alberta, Manitoba]

  aafc:
    # Optional sub-provincial yields (e.g. SCIC RM / MASC). See data/aafc.py.
    yield_csv: null                  # path to an AAFC/SCIC region-yield CSV, if available

model:
  type: random_forest            # random_forest | gradient_boosting | linear
  target: yield_kg_ha
  test_size: 0.2
  random_state: 42
  random_forest:
    n_estimators: 300
    max_depth: null
    min_samples_leaf: 3
