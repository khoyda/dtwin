# Configuration for the Canola Digital Twin
# Paths are relative to the project root unless absolute.

paths:
  data_raw: data/raw
  data_processed: data/processed
  data_external: data/external
  artifacts: artifacts

region:
  name: Canadian Prairies
  # Default agro-climatic zone used when a field has no explicit zone.
  default_zone: SK-dark-brown

season:
  # Typical Prairie canola calendar (day-of-year bounds for the simulation window).
  seeding_doy_default: 130     # ~ May 10
  harvest_doy_default: 260     # ~ mid-September

agronomy:
  gdd_base_temp_c: 5.0         # canola base temperature for GDD accumulation
  gdd_cap_temp_c: 30.0         # upper cap applied to daily mean before GDD calc
  heat_stress_threshold_c: 29.5  # daily max above this during flowering -> flower abortion
  # Cumulative GDD thresholds (base 5C) marking phenological stage transitions.
  stage_gdd_thresholds:
    emergence: 120
    rosette: 350
    bolting: 600
    flowering: 900
    ripening: 1500
    maturity: 1900

water_balance:
  soil_water_capacity_mm: 150.0   # plant-available water in rooting zone
  initial_soil_water_frac: 0.7    # fraction of capacity at seeding
  crop_coefficient_kc: 1.0        # mid-season Kc (simplified, single value)

data_sources:
  # Training window (years). Canola yields available well before this; kept
  # recent so a single ECCC station ID covers the period without stitching.
  start_year: 1995
  end_year: 2023
  # Years excluded from model FITTING (calibration + ML training). E.g. 2021 was a
  # severe Prairie drought; excluding it recalibrates to a non-drought baseline.
  # (Does not affect scenario weather selection — you can still forecast with 2021.)
  exclude_years: [2021]
  # Growing-season window used to aggregate daily weather into season features.
  season_start: {month: 5, day: 1}    # ~ seeding
  season_end: {month: 9, day: 30}     # ~ harvest

  eccc:
    # Multiple long-record stations per province, spread across the canola belt and
    # verified for daily-data completeness (1995-2023). Simulated yields are averaged
    # across a province's stations to approximate the spatial average that a provincial
    # yield statistic represents. station_id -> {province, name, lat, lon}.
    stations:
      # Saskatchewan (SE, W-central, central, SW-central, NW)
      2925: {province: Saskatchewan, name: INDIAN HEAD CDA, lat: 50.55, lon: -103.65}
      3259: {province: Saskatchewan, name: SCOTT CDA, lat: 52.36, lon: -108.83}
      3318: {province: Saskatchewan, name: OUTLOOK PFRA, lat: 51.48, lon: -107.05}
      3071: {province: Saskatchewan, name: BEECHY, lat: 50.83, lon: -107.31}
      3212: {province: Saskatchewan, name: BUTTE ST PIERRE, lat: 53.45, lon: -109.20}
      # Alberta (NE, central, central-east, east, south)
      2832: {province: Alberta, name: COLD LAKE A, lat: 54.42, lon: -110.28}
      1870: {province: Alberta, name: EDMONTON STONY PLAIN, lat: 53.55, lon: -114.11}
      1839: {province: Alberta, name: CAMROSE, lat: 53.05, lon: -112.82}
      1881: {province: Alberta, name: FABYAN, lat: 52.97, lon: -111.00}
      2224: {province: Alberta, name: CLARESHOLM, lat: 50.00, lon: -113.64}
      # Manitoba (S Red River, SE/central, SW, central-west, NW)
      26857: {province: Manitoba, name: CARMAN U OF M CS, lat: 49.50, lon: -98.03}
      3678: {province: Manitoba, name: STONY MOUNTAIN, lat: 50.12, lon: -97.17}
      3463: {province: Manitoba, name: BALDUR, lat: 49.28, lon: -99.29}
      3853: {province: Manitoba, name: MCCREARY, lat: 50.71, lon: -99.53}
      3820: {province: Manitoba, name: MAFEKING, lat: 52.67, lon: -101.10}

  statcan:
    table_pid: "32100359"            # Estimated areas, yield, production of crops
    crop: Canola (rapeseed)
    wheat_crop: Wheat, spring        # StatCan crop name for the wheat digital twin
    barley_crop: Barley              # StatCan crop name for the barley digital twin
    yield_disposition: Average yield (kilograms per hectare)
    provinces: [Saskatchewan, Alberta, Manitoba]

  aafc:
    # Optional sub-provincial yields (e.g. SCIC RM / MASC). See data/aafc.py.
    yield_csv: null                  # path to an AAFC/SCIC region-yield CSV, if available

process_model:
  # Calibratable parameters for the APSIM-style crop model (process_model.py).
  # Defaults are conventional Prairie values; `scripts/calibrate_process_model.py`
  # tunes a subset against trend-adjusted StatCan yields and writes the result to
  # artifacts/calibrated_params.json (which overrides these at load time).
  # Calibrated 2026-06-07 vs StatCan canola yields, 52 ECCC stations, 2021 (drought) EXCLUDED.
  rue: 1.75                  # radiation-use efficiency, g biomass / MJ PAR (yield level)
  kl: 0.14                   # root water-uptake coefficient (drought sensitivity)
  hi_heat_sensitivity: 0.06  # harvest-index loss per flowering heat-stress day
  harvest_index: 0.28        # potential harvest index

wheat_model:
  # Calibratable parameters for the spring-wheat process model (simulation/wheat_model.py).
  # Defaults are conventional Prairie spring-wheat values; calibrate_wheat_model.py tunes a
  # subset vs trend-adjusted StatCan spring-wheat yields -> artifacts/wheat_calibrated_params.json.
  # Calibrated 2026-06-07 vs StatCan spring-wheat yields, 52 ECCC stations, 2021 EXCLUDED.
  rue: 2.38                  # radiation-use efficiency, g biomass / MJ PAR
  kl: 0.14                   # root water-uptake coefficient (drought sensitivity)
  hi_heat_sensitivity: 0.09  # harvest-index loss per grain-fill heat-stress day
  harvest_index: 0.42        # potential harvest index (wheat > canola)

barley_model:
  # Calibratable parameters for the spring-barley process model (simulation/barley_model.py).
  # Barley: short-season, cold-tolerant, high harvest index. calibrate_barley_model.py tunes a
  # subset vs trend-adjusted StatCan barley yields -> artifacts/barley_calibrated_params.json.
  # Calibrated 2026-06-07 vs StatCan barley yields, 52 ECCC stations, 2021 EXCLUDED.
  rue: 2.13                  # radiation-use efficiency, g biomass / MJ PAR
  kl: 0.14                   # root water-uptake coefficient (drought sensitivity)
  hi_heat_sensitivity: 0.09  # harvest-index loss per grain-fill heat-stress day
  harvest_index: 0.48        # potential harvest index (barley > wheat)

model:
  type: random_forest            # random_forest | gradient_boosting | linear
  target: yield_kg_ha
  test_size: 0.2
  random_state: 42
  random_forest:
    n_estimators: 300
    max_depth: null
    min_samples_leaf: 3
